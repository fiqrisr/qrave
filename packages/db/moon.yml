layer: "library"
tags: ["bun"]

tasks:
  generate:
    command: "bunx drizzle-kit generate"
    options:
      runInCI: false
      envFile: "/.env"

  push:
    command: "bunx drizzle-kit push"
    options:
      runInCI: false
      envFile: "/.env"

  seed:
    command: "bun run src/seed.ts"
    options:
      runInCI: false
      envFile: "/.env"
