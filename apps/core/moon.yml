layer: "application"
tags: ["bun"]

tasks:
  dev:
    command: "bun run --watch src/index.ts"
    preset: "server"

  generate:
    command: "bunx drizzle-kit generate"
    options:
      runInCI: false

  push:
    command: "bunx drizzle-kit push"
    options:
      runInCI: false

  seed:
    command: "bun run src/db/seed.ts"
    options:
      runInCI: false
